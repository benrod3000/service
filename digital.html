    <main class="workspace-card">

  <script>
    const cardShell = document.querySelector('.digital-container');
    const stage = document.getElementById('card-content-wrapper');
    const rotator = document.getElementById('sidebar-rotator');
    const cursor = document.getElementById('ui-cursor');
    const railTabs = [...document.querySelectorAll('.rail-tab')];
    const interactiveTargets = () => document.querySelectorAll('.rail-tab, .workspace-back, .profile-cta, .profile-socials a, .contact-form button');
    const phrases = ['Growth Systems Architect', 'Audience Ownership Strategist', 'Paid + Organic Scale Operator'];
    let bindCursorTargets = () => {};
    let phraseIndex = 0;
    let currentSection = 'about';

    function applyScanLeadEmphasis(root) {
      const targets = root.querySelectorAll('.card-title-wrap p, .about-block p, .timeline-item p, .service-card p, .project-card p, .blog-card p');
      targets.forEach((paragraph) => {
        if (paragraph.dataset.scanLead === 'true') return;
        const text = paragraph.textContent.replace(/\s+/g, ' ').trim();
        if (!text) return;
        const words = text.split(' ');
        if (words.length < 5) return;
        const lead = words.slice(0, 3).join(' ');
        const rest = words.slice(3).join(' ');
        paragraph.innerHTML = `<strong class="scan-lead">${lead}</strong> ${rest}`;
        paragraph.dataset.scanLead = 'true';
      });
    }

    function animateAboutStats(root) {
      const statNodes = root.querySelectorAll('.stats-row .stat-pill strong[data-count-target]');
      if (!statNodes.length) {
        return;
      }

      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      statNodes.forEach((node, idx) => {
        const target = Number(node.dataset.countTarget || '0');
        const suffix = node.dataset.countSuffix || '';

        if (!Number.isFinite(target)) {
          return;
        }

        const duration = prefersReducedMotion ? 760 + idx * 120 : 980 + idx * 140;
        const start = performance.now();
        const step = prefersReducedMotion ? Math.max(1, Math.ceil(target / 6)) : 1;

        const tick = (now) => {
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const rawValue = Math.round(target * eased);
          const value = progress === 1 ? target : Math.min(target, Math.floor(rawValue / step) * step);
          node.textContent = `${value}${suffix}`;

          if (progress < 1) {
            requestAnimationFrame(tick);
          }
        };

        node.textContent = `0${suffix}`;
        requestAnimationFrame(tick);
      });
    }

    if (window.matchMedia('(hover: hover)').matches && cardShell) {
      const maxTilt = 1.8;
      cardShell.addEventListener('mousemove', (event) => {
        const rect = cardShell.getBoundingClientRect();
        const px = (event.clientX - rect.left) / rect.width - 0.5;
        const py = (event.clientY - rect.top) / rect.height - 0.5;
        cardShell.style.transform = `perspective(1200px) rotateX(${(-py * maxTilt).toFixed(2)}deg) rotateY(${(px * maxTilt).toFixed(2)}deg)`;
      });

      cardShell.addEventListener('mouseleave', () => {
        cardShell.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg)';
      });
    }

    document.querySelectorAll('img.blur-up').forEach((img) => {
      const cover = img.closest('.profile-cover');
      const markLoaded = () => {
        img.classList.add('loaded');
        if (cover) cover.classList.add('is-loaded');
      };
      if (img.complete) {
        markLoaded();
      } else {
        img.addEventListener('load', markLoaded, { once: true });
      }
    });

    if (cursor && window.matchMedia('(hover: hover)').matches) {
      window.addEventListener('mousemove', (event) => {
        cursor.style.left = `${event.clientX}px`;
        cursor.style.top = `${event.clientY}px`;
      });

      bindCursorTargets = () => {
        interactiveTargets().forEach((el) => {
          el.addEventListener('mouseenter', () => cursor.classList.add('active'));
          el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
      };

      bindCursorTargets();
    }

    setInterval(() => {
      phraseIndex = (phraseIndex + 1) % phrases.length;
      rotator.textContent = phrases[phraseIndex];
    }, 2600);

    function sectionTemplate(section) {
      if (section === 'about') {
        return `
          <article class="stage-card section-enter" data-section="about" data-ghost="ABOUT">
            <div class="card-title-wrap">
              <span class="card-kicker">About</span>
              <h3>Growth systems built for ownership, not dependency</h3>
              <p>I partner with creators, brands, and founder-led teams to turn attention into durable channels they fully control.</p>
            </div>

            <div class="about-grid">
              <div class="about-block">
                <h4>Core Philosophy</h4>
                <p>Replace campaign spikes with repeatable loops. Every initiative is designed to improve acquisition, retention, and long-term audience leverage.</p>
              </div>
              <div class="about-block">
                <h4>Operating Model</h4>
                <p>Clear positioning, disciplined publishing cadence, paid amplification, and email conversion managed through weekly measurement and iteration.</p>
              </div>
            </div>

            <div class="stats-row">
              <div class="stat-pill"><strong data-count-target="10" data-count-suffix="+">0+</strong><span>Years Experience</span></div>
              <div class="stat-pill"><strong data-count-target="20" data-count-suffix="+">0+</strong><span>Campaigns Launched</span></div>
              <div class="stat-pill"><strong data-count-target="3" data-count-suffix="x">0x</strong><span>Average ROAS</span></div>
            </div>

            <div class="about-bridge" aria-hidden="true"></div>
          </article>
        `;
      }

      if (section === 'services') {
        return `
          <article class="stage-card section-enter" data-section="services" data-ghost="RESUME">
            <div class="card-title-wrap">
              <span class="card-kicker">Capabilities</span>
              <h3>Strategic execution for measurable growth</h3>
              <p>Each engagement is scoped around clear business outcomes, with systems that compound after launch.</p>
            </div>

            <div class="resume-layout">
              <div class="resume-column">
                <h4 class="resume-heading">Experience</h4>
                <div class="timeline-list">
                  <article class="timeline-item active">
                    <span class="timeline-date">2022 - Present</span>
                    <h5>Digital Marketing Manager</h5>
                    <p>Built full-funnel acquisition and retention systems for creators and founder-led brands.</p>
                  </article>
                  <article class="timeline-item">
                    <span class="timeline-date">2018 - 2022</span>
                    <h5>Growth Strategist</h5>
                    <p>Designed compounding growth loops linking content, paid media, and owned channels.</p>
                  </article>
                </div>
              </div>
              <div class="resume-column">
                <h4 class="resume-heading">Education + Certifications</h4>
                <div class="timeline-list">
                  <article class="timeline-item">
                    <span class="timeline-date">2016</span>
                    <h5>Marketing Analytics Program</h5>
                    <p>Advanced reporting and conversion modeling for scalable campaign optimization.</p>
                  </article>
                  <article class="timeline-item">
                    <span class="timeline-date">2014</span>
                    <h5>Digital Strategy Certification</h5>
                    <p>Specialized in audience development, editorial systems, and channel positioning.</p>
                  </article>
                </div>
              </div>
            </div>

            <div class="service-grid">
              <div class="service-card">
                <div class="service-title-col">
                  <h4><svg class="service-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M4 20h16"/><path d="M7 16v-4"/><path d="M12 16v-8"/><path d="M17 16v-11"/></svg><span>Growth Strategy</span></h4>
                  <span class="tag">Roadmap</span>
                </div>
                <div class="service-desc-col">
                  <p>Audience research, positioning, and channel sequencing.</p>
                </div>
              </div>
              <div class="service-card">
                <div class="service-title-col">
                  <h4><svg class="service-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M12 4 3 9l9 5 9-5-9-5Z"/><path d="m3 13 9 5 9-5"/></svg><span>Content Systems</span></h4>
                  <span class="tag">Ops</span>
                </div>
                <div class="service-desc-col">
                  <p>Editorial engines and repurposing pipelines for consistency.</p>
                </div>
              </div>
              <div class="service-card">
                <div class="service-title-col">
                  <h4><svg class="service-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 11v2"/><path d="M6 9v6"/><path d="M9 8c6 0 9-3 12-4v16c-3-1-6-4-12-4Z"/></svg><span>Paid Media</span></h4>
                  <span class="tag">Acquisition</span>
                </div>
                <div class="service-desc-col">
                  <p>Meta and YouTube campaigns tuned for scale and ROI.</p>
                </div>
              </div>
              <div class="service-card">
                <div class="service-title-col">
                  <h4><svg class="service-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="6"/><path d="m20 20-4.2-4.2"/></svg><span>SEO + Conversion</span></h4>
                  <span class="tag">Demand</span>
                </div>
                <div class="service-desc-col">
                  <p>Search visibility and web experiences that convert.</p>
                </div>
              </div>
            </div>

            <div class="meter-group">
              <div class="meter-item"><span>Strategy & Analytics</span><div class="meter"><i style="--fill: 92%"></i></div></div>
              <div class="meter-item"><span>Paid Distribution</span><div class="meter"><i style="--fill: 88%"></i></div></div>
              <div class="meter-item"><span>Email Retention Systems</span><div class="meter"><i style="--fill: 84%"></i></div></div>
            </div>
          </article>
        `;
      }

      if (section === 'portfolio') {
        return `
          <article class="stage-card section-enter" data-section="portfolio" data-ghost="PORTFOLIO">
            <div class="card-title-wrap">
              <span class="card-kicker">Projects</span>
              <h3>Execution with measurable business outcomes</h3>
              <p>Selected engagements focused on scalable acquisition, stronger retention, and owned audience value.</p>
            </div>

            <div class="project-list">
              <article class="project-card">
                <header><span>Release System</span><strong>+220% Audience Growth</strong></header>
                <h4>Independent Artist Campaign Architecture</h4>
                <p>Campaign sequencing across organic + paid touchpoints to turn drops into repeatable growth events.</p>
              </article>
              <article class="project-card">
                <header><span>Distribution Engine</span><strong>4M+ Impressions</strong></header>
                <h4>Multi-platform Content Flywheel</h4>
                <p>A repeatable content system that compounds reach while reducing creator workload.</p>
              </article>
              <article class="project-card">
                <header><span>Owned Audience</span><strong>0 to 4.2K Subscribers</strong></header>
                <h4>Email Ownership Stack</h4>
                <p>Opt-in architecture and automations that convert attention into a controllable audience asset.</p>
              </article>
            </div>

            <div class="blog-panel">
              <div class="blog-panel-head">
                <h4>Latest Insights</h4>
                <p>Blog-style updates from real campaign execution.</p>
              </div>
              <div class="blog-grid">
                <article class="blog-card">
                  <span class="blog-meta">May 2026 · Strategy</span>
                  <h5>Why attention without ownership keeps brands fragile</h5>
                  <p>The exact framework we use to move from platform dependency into owned audience systems.</p>
                </article>
                <article class="blog-card">
                  <span class="blog-meta">April 2026 · Paid Media</span>
                  <h5>Scaling creative testing without burning the team</h5>
                  <p>How to structure experiments so media spend and creative production improve together.</p>
                </article>
                <article class="blog-card">
                  <span class="blog-meta">March 2026 · Retention</span>
                  <h5>Email automation that actually drives revenue</h5>
                  <p>The sequence architecture behind higher open rates, stronger LTV, and fewer dead lists.</p>
                </article>
              </div>
            </div>
          </article>
        `;
      }

      return `
        <article class="stage-card section-enter" data-section="contact" data-ghost="CONTACT">
          <div class="card-title-wrap">
            <span class="card-kicker">Contact</span>
            <h3>Let’s build growth you can keep</h3>
            <p>Share your goals, timeline, and constraints. I will follow up with a focused, practical next-step plan.</p>
          </div>

          <div class="contact-grid">
            <div class="contact-block">
              <h4>Direct</h4>
              <p><strong>Email:</strong> <a href="mailto:benrod1@gmail.com">benrod1@gmail.com</a></p>
              <p><strong>Location:</strong> Southern California</p>
            </div>
            <form class="contact-form" onsubmit="event.preventDefault()">
              <label>Name<input type="text" placeholder="Your name" required></label>
              <label>Email<input type="email" placeholder="you@company.com" required></label>
              <label>Message<textarea placeholder="Tell me about your growth goals" required></textarea></label>
              <button type="submit">Send Message</button>
            </form>
          </div>
        </article>
      `;
    }

    function mountSection(section) {
      if (section === currentSection && stage.childElementCount > 0) {
        if (section === 'about') {
          const activeCard = stage.querySelector('.stage-card[data-section="about"]');
          if (activeCard) {
            animateAboutStats(activeCard);
          }
        }
        return;
      }

      currentSection = section;
      const currentCard = stage.querySelector('.stage-card');
      const nextHost = document.createElement('div');
      nextHost.innerHTML = sectionTemplate(section).trim();
      const nextCard = nextHost.firstElementChild;

      if (!nextCard) {
        return;
      }

      applyScanLeadEmphasis(nextCard);

      const activateSectionEffects = () => {
        if (section === 'about') {
          animateAboutStats(nextCard);
        }

        if (section === 'services') {
          stage.querySelectorAll('.meter i').forEach((bar, idx) => {
            setTimeout(() => {
              bar.style.width = getComputedStyle(bar).getPropertyValue('--fill');
            }, 120 * idx);
          });
        }

      };

      if (!currentCard) {
        stage.innerHTML = '';
        stage.appendChild(nextCard);
        requestAnimationFrame(() => {
          nextCard.classList.add('section-enter-active');
          activateSectionEffects();
          bindCursorTargets();
        });
        return;
      }

      currentCard.classList.add('section-exit-active');

      setTimeout(() => {
        currentCard.remove();
        stage.appendChild(nextCard);
        requestAnimationFrame(() => {
          nextCard.classList.add('section-enter-active');
          activateSectionEffects();
          bindCursorTargets();
        });
      }, 300);
    }

    railTabs.forEach((btn) => {
      btn.setAttribute('aria-pressed', String(btn.classList.contains('active')));
      if (btn.classList.contains('active')) {
        btn.setAttribute('aria-current', 'page');
      } else {
        btn.removeAttribute('aria-current');
      }
      btn.addEventListener('click', () => {
        if (btn.dataset.section === currentSection) {
          return;
        }

        railTabs.forEach((b) => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
          b.removeAttribute('aria-current');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        btn.setAttribute('aria-current', 'page');
        mountSection(btn.dataset.section);
      });
    });

    mountSection('about');
  </script>
</body>
</html>
