    function initAmbientCanvas() {
      if (!ambientCanvas) {
        return;
      }

      const viewCtx = ambientCanvas.getContext('2d', { alpha: true });
      if (!viewCtx) {
        return;
      }

      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)');
      const lowPowerViewport = window.matchMedia('(max-width: 768px)');
      const rootStyles = getComputedStyle(document.documentElement);
      const accentHue = Number.parseFloat(rootStyles.getPropertyValue('--accent-h')) || 156;
      const canvasSat = rootStyles.getPropertyValue('--canvas-sat').trim() || '50%';
      const canvasLight = rootStyles.getPropertyValue('--canvas-light').trim() || '39%';
      const canvasAlphaBase = Number.parseFloat(rootStyles.getPropertyValue('--canvas-alpha')) || 0.16;

      const TAU = Math.PI * 2;
      const propCount = 8;
      const baseSpeed = 0.08;
      const rangeSpeed = 0.6;
      const baseTtl = 140;
      const rangeTtl = 180;
      const baseRadius = 72;
      const rangeRadius = 170;
      const rangeHue = 55;
      const xOff = 0.0015;
      const yOff = 0.0015;
      const zOff = 0.0015;

      const bufferCanvas = document.createElement('canvas');
      const bufferCtx = bufferCanvas.getContext('2d', { alpha: true });
      if (!bufferCtx) {
        return;
      }

      let rafId = 0;
      let width = 0;
      let height = 0;
      let dpr = 1;
      let circleCount = 0;
      let circleProps;
      let baseHue = accentHue;

      const rand = (n) => Math.random() * n;
      const fadeInOut = (t, ttl) => {
        const half = 0.5 * ttl;
        return Math.abs(((t + half) % ttl) - half) / half;
      };

      const pseudoNoise3D = (x, y, z) => {
        const value = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453;
        return (value - Math.floor(value)) * 2 - 1;
      };

      function initCircle(offset) {
        const x = rand(width);
        const y = rand(height);
        const n = pseudoNoise3D(x * xOff, y * yOff, baseHue * zOff);
        const angle = rand(TAU);
        const speed = baseSpeed + rand(rangeSpeed);
        const vx = Math.cos(angle) * speed;
        const vy = Math.sin(angle) * speed;
        const life = 0;
        const ttl = baseTtl + rand(rangeTtl);
        const radius = baseRadius + rand(rangeRadius);
        const hue = baseHue + n * rangeHue;

        circleProps[offset] = x;
        circleProps[offset + 1] = y;
        circleProps[offset + 2] = vx;
        circleProps[offset + 3] = vy;
        circleProps[offset + 4] = life;
        circleProps[offset + 5] = ttl;
        circleProps[offset + 6] = radius;
        circleProps[offset + 7] = hue;
      }

      function initCircles() {
        circleCount = lowPowerViewport.matches ? 90 : 150;
        circleProps = new Float32Array(circleCount * propCount);

        for (let i = 0; i < circleProps.length; i += propCount) {
          initCircle(i);
        }
      }

      function drawCircle(x, y, life, ttl, radius, hue) {
        const alpha = fadeInOut(life, ttl) * canvasAlphaBase;
        bufferCtx.fillStyle = `hsla(${hue}, ${canvasSat}, ${canvasLight}, ${alpha})`;
        bufferCtx.beginPath();
        bufferCtx.arc(x, y, radius, 0, TAU);
        bufferCtx.fill();
      }

      function isOutOfBounds(x, y, radius) {
        return x < -radius || x > width + radius || y < -radius || y > height + radius;
      }

      function updateCircles() {
        baseHue += 0.25;

        for (let i = 0; i < circleProps.length; i += propCount) {
          const x = circleProps[i];
          const y = circleProps[i + 1];
          const vx = circleProps[i + 2];
          const vy = circleProps[i + 3];
          const life = circleProps[i + 4];
          const ttl = circleProps[i + 5];
          const radius = circleProps[i + 6];
          const hue = circleProps[i + 7];

          drawCircle(x, y, life, ttl, radius, hue);

          const nextLife = life + 1;
          circleProps[i] = x + vx;
          circleProps[i + 1] = y + vy;
          circleProps[i + 4] = nextLife;

          if (nextLife > ttl || isOutOfBounds(x, y, radius)) {
            initCircle(i);
          }
        }
      }

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        dpr = Math.min(window.devicePixelRatio || 1, 2);

        ambientCanvas.width = Math.max(1, Math.floor(width * dpr));
        ambientCanvas.height = Math.max(1, Math.floor(height * dpr));
        bufferCanvas.width = ambientCanvas.width;
        bufferCanvas.height = ambientCanvas.height;
        ambientCanvas.style.width = `${width}px`;
        ambientCanvas.style.height = `${height}px`;

        viewCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        bufferCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
        initCircles();
      }

      function paintFrame() {
        bufferCtx.clearRect(0, 0, width, height);
        viewCtx.clearRect(0, 0, width, height);

        updateCircles();

        viewCtx.save();
        viewCtx.filter = lowPowerViewport.matches ? 'blur(38px)' : 'blur(52px)';
        viewCtx.drawImage(bufferCanvas, 0, 0, width, height);
        viewCtx.restore();

        viewCtx.save();
        viewCtx.globalAlpha = 0.32;
        viewCtx.drawImage(bufferCanvas, 0, 0, width, height);
        viewCtx.restore();
      }

      function frame() {
        paintFrame();
        rafId = window.requestAnimationFrame(frame);
      }

      function refreshAnimationMode() {
        if (rafId) {
          window.cancelAnimationFrame(rafId);
          rafId = 0;
        }

        paintFrame();

        if (!prefersReducedMotion.matches) {
          rafId = window.requestAnimationFrame(frame);
        }
      }

      resizeCanvas();
      refreshAnimationMode();

      window.addEventListener('resize', () => {
        resizeCanvas();
        refreshAnimationMode();
      });

      prefersReducedMotion.addEventListener('change', refreshAnimationMode);
    }

    initAmbientCanvas();

    function syncMobileProfileCompaction() {
      if (!profileCard || !stage) {
        return;
      }

      const shouldCompact = compactProfileQuery.matches && stage.scrollTop > compactProfileThreshold;
      profileCard.classList.toggle('is-compact', shouldCompact);

      if (railNav) {
        const shouldElevateDock = compactProfileQuery.matches && stage.scrollTop > dockScrollThreshold;
        railNav.classList.toggle('is-scrolled', shouldElevateDock);
      }
    }

    function applyScanLeadEmphasis(root) {
      const targets = root.querySelectorAll('.card-title-wrap p, .about-block p, .timeline-item p, .service-card p, .project-card p, .blog-card p');
      targets.forEach((paragraph) => {
        if (paragraph.dataset.scanLead === 'true') return;
        const text = paragraph.textContent.replace(/\s+/g, ' ').trim();
        if (!text) return;
        const words = text.split(' ');
        if (words.length < 5) return;
        const lead = words.slice(0, 3).join(' ');
        const rest = words.slice(3).join(' ');
        paragraph.innerHTML = `<strong class="scan-lead">${lead}</strong> ${rest}`;
        paragraph.dataset.scanLead = 'true';
      });
    }

    function animateAboutStats(root) {
      const statNodes = root.querySelectorAll('.stats-row .stat-pill strong[data-count-target]');
      if (!statNodes.length) {
        return;
      }

      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      statNodes.forEach((node, idx) => {
        const target = Number(node.dataset.countTarget || '0');
        const suffix = node.dataset.countSuffix || '';

        if (!Number.isFinite(target)) {
          return;
        }

        const duration = prefersReducedMotion ? 760 + idx * 120 : 980 + idx * 140;
        const start = performance.now();
        const step = prefersReducedMotion ? Math.max(1, Math.ceil(target / 6)) : 1;

        const tick = (now) => {
          const progress = Math.min((now - start) / duration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const rawValue = Math.round(target * eased);
          const value = progress === 1 ? target : Math.min(target, Math.floor(rawValue / step) * step);
          node.textContent = `${value}${suffix}`;

          if (progress < 1) {
            requestAnimationFrame(tick);
          }
        };

        node.textContent = `0${suffix}`;
        requestAnimationFrame(tick);
      });
    }

    if (window.matchMedia('(hover: hover)').matches && cardShell) {
      const maxTilt = 1.8;
      cardShell.addEventListener('mousemove', (event) => {
        const rect = cardShell.getBoundingClientRect();
        const px = (event.clientX - rect.left) / rect.width - 0.5;
        const py = (event.clientY - rect.top) / rect.height - 0.5;
        cardShell.style.transform = `perspective(1200px) rotateX(${(-py * maxTilt).toFixed(2)}deg) rotateY(${(px * maxTilt).toFixed(2)}deg)`;
      });

      cardShell.addEventListener('mouseleave', () => {
        cardShell.style.transform = 'perspective(1200px) rotateX(0deg) rotateY(0deg)';
      });
    }

    document.querySelectorAll('img.blur-up').forEach((img) => {
      const cover = img.closest('.profile-cover');
      const markLoaded = () => {
        img.classList.add('loaded');
        if (cover) cover.classList.add('is-loaded');
      };
      if (img.complete) {
        markLoaded();
      } else {
        img.addEventListener('load', markLoaded, { once: true });
      }
    });

    if (cursor && window.matchMedia('(hover: hover)').matches) {
      window.addEventListener('mousemove', (event) => {
        cursor.style.left = `${event.clientX}px`;
        cursor.style.top = `${event.clientY}px`;
      });

      bindCursorTargets = () => {
        interactiveTargets().forEach((el) => {
          el.addEventListener('mouseenter', () => cursor.classList.add('active'));
          el.addEventListener('mouseleave', () => cursor.classList.remove('active'));
        });
      };

      bindCursorTargets();
    }

      rotator.textContent = phrases[phraseIndex];

            </div>

                <h4 class="resume-heading">Experience</h4>

                  <article class="timeline-item active">

                    <span class="timeline-date">2018 - 2022</span>

              </div>
              <div class="resume-column">
                <h4 class="resume-heading">Education + Certifications</h4>
                <div class="timeline-list">
                  <article class="timeline-item">

                </div>
              </div>
            </div>

            <div class="service-grid">
              <div class="service-card animate">
                <div class="service-title-col">
                  <h4><svg class="service-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M4 20h16"/><path d="M7 16v-4"/><path d="M12 16v-8"/><path d="M17 16v-11"/></svg><span>Growth Strategy</span></h4>
                  <span class="service-subtitle">Ecosystem Orchestration</span>

                  <span class="service-subtitle">Narrative Precision</span>

              <div class="service-card animate">
                <div class="service-title-col">
                  <h4><svg class="service-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><path d="M3 11v2"/><path d="M6 9v6"/><path d="M9 8c6 0 9-3 12-4v16c-3-1-6-4-12-4Z"/></svg><span>Paid Media</span></h4>
                  <span class="service-subtitle">Distribution Architecture</span>
                  <span class="tag">Acquisition</span>
                </div>
                <div class="service-desc-col">
                  <p>Turning spend into controlled distribution with clean feedback loops and measurable lift.</p>
                </div>
              </div>
              <div class="service-card animate">
                <div class="service-title-col">
                  <h4><svg class="service-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true"><circle cx="11" cy="11" r="6"/><path d="m20 20-4.2-4.2"/></svg><span>SEO + Conversion</span></h4>
                  <span class="service-subtitle">Digital Architecture</span>
                  <span class="tag">Demand</span>
                </div>
                <div class="service-desc-col">
                  <p>Borderless interfaces and search pathways that reduce friction, improve speed, and lift conversion.</p>
                </div>
              </div>
            </div>

            <div class="meter-group">
              <div class="meter-item"><span>Strategy & Analytics</span><div class="meter"><i style="--fill: 92%"></i></div></div>
              <div class="meter-item"><span>Paid Distribution</span><div class="meter"><i style="--fill: 88%"></i></div></div>
              <div class="meter-item"><span>Email Retention Systems</span><div class="meter"><i style="--fill: 84%"></i></div></div>
            </div>
          </article>
        `;
      }

      if (section === 'portfolio') {
        return `
          <article class="stage-card section-enter" data-section="portfolio" data-ghost="PORTFOLIO">
            <div class="card-title-wrap">
              <span class="card-kicker">Method</span>
              <h3>Principles over portfolio</h3>
              <p>Three operating beliefs that keep strategy, design, and code aligned when the work needs to be clear, fast, and accountable.</p>
            </div>

            <div class="method-grid">
              <article class="method-card animate">
                <span class="method-index">01</span>
                <h4>Architecture over Aesthetics</h4>
                <p>Design must serve the data. Beautiful decisions are useful only when they reduce friction and make the system easier to trust.</p>
              </article>
              <article class="method-card animate">
                <span class="method-index">02</span>
                <h4>Scale through Simplicity</h4>
                <p>If it becomes too complex to manage, it is already broken. Simpler systems create better throughput, clearer feedback, and less waste.</p>

              <article class="method-card animate">

                <h4>Full-Stack Accountability</h4>
                <p>The strategy, the copy, the interface, and the code should speak with one voice so execution stays aligned with intent.</p>
              </article>
            </div>

            <div class="blog-panel">
              <div class="blog-panel-head">
                <h4>Latest Insights</h4>
                <p>Actionable insights drawn from real campaign execution.</p>
              </div>
              <div class="blog-grid">
                <article class="blog-card animate">
                  <span class="blog-meta">Strategy Insight</span>
                  <h5>Why attention without ownership keeps brands fragile</h5>
                  <p>The exact framework we use to move from platform dependency into owned audience systems.</p>
                </article>
                <article class="blog-card animate">
                  <span class="blog-meta">Paid Media Insight</span>
                  <h5>Scaling creative testing without burning the team</h5>
                  <p>How to structure experiments so media spend and creative production improve together.</p>
                </article>
                <article class="blog-card animate">
                  <span class="blog-meta">Retention Insight</span>
                  <h5>Email automation that actually drives revenue</h5>
                  <p>The sequence architecture behind higher open rates, stronger LTV, and fewer dead lists.</p>
                </article>
              </div>
            </div>
          </article>
        `;
      }

      return `
        <article class="stage-card section-enter" data-section="contact" data-ghost="CONTACT">
          <div class="card-title-wrap">
            <span class="card-kicker">Consultation</span>
            <h3>Request a Digital Consultation</h3>
            <p>Share your goals, timeline, and constraints. I’ll follow up with a clear next step focused on clarity, systems, and execution.</p>
          </div>

          <div class="contact-grid">
            <div class="contact-block">
              <h4>Direct</h4>
              <p><strong>Email:</strong> <a href="mailto:benrod1@gmail.com">benrod1@gmail.com</a></p>
              <p><strong>Location:</strong> Southern California</p>
            </div>
            <form class="contact-form" onsubmit="event.preventDefault()">
              <label>Name<input type="text" placeholder="Your name" required></label>
              <label>Email<input type="email" placeholder="you@company.com" required></label>
              <label>Message<textarea placeholder="Tell me about your growth goals" required></textarea></label>
              <button type="submit">Request a Digital Consultation</button>
            </form>
          </div>
        </article>
      `;
    }

    function mountSection(section) {
      if (section === currentSection && stage.childElementCount > 0) {
        if (section === 'about') {
          const activeCard = stage.querySelector('.stage-card[data-section="about"]');
          if (activeCard) {
            animateAboutStats(activeCard);
          }
        }
        return;
      }

      currentSection = section;
      const currentCard = stage.querySelector('.stage-card');
      const nextHost = document.createElement('div');
      nextHost.innerHTML = sectionTemplate(section).trim();
      const nextCard = nextHost.firstElementChild;

      if (!nextCard) {
        return;
      }

      applyScanLeadEmphasis(nextCard);

      const activateSectionEffects = () => {
        if (section === 'about') {
          animateAboutStats(nextCard);
        }

        if (section === 'services') {
          stage.querySelectorAll('.meter i').forEach((bar, idx) => {
            setTimeout(() => {
              bar.style.width = getComputedStyle(bar).getPropertyValue('--fill');
            }, 120 * idx);
          });
        }

      };

      if (!currentCard) {
        stage.innerHTML = '';
        stage.appendChild(nextCard);
        requestAnimationFrame(() => {
          nextCard.classList.add('section-enter-active');
          activateSectionEffects();
          bindCursorTargets();
        });
        return;
      }

      currentCard.classList.add('section-exit-active');

      setTimeout(() => {
        currentCard.remove();
        stage.appendChild(nextCard);
        requestAnimationFrame(() => {
          nextCard.classList.add('section-enter-active');
          activateSectionEffects();
          bindCursorTargets();
        });
      }, 300);
    }

    railTabs.forEach((btn) => {
      btn.setAttribute('aria-pressed', String(btn.classList.contains('active')));
      if (btn.classList.contains('active')) {
        btn.setAttribute('aria-current', 'page');
      } else {
        btn.removeAttribute('aria-current');
      }
      btn.addEventListener('click', () => {
        if (btn.dataset.section === currentSection) {
          return;
        }

        railTabs.forEach((b) => {
          b.classList.remove('active');
          b.setAttribute('aria-pressed', 'false');
          b.removeAttribute('aria-current');
        });
        btn.classList.add('active');
        btn.setAttribute('aria-pressed', 'true');
        btn.setAttribute('aria-current', 'page');
        mountSection(btn.dataset.section);
      });
    });

    mountSection('about');

    if (profileCard && stage) {
      stage.addEventListener('scroll', syncMobileProfileCompaction, { passive: true });
      compactProfileQuery.addEventListener('change', () => {
        if (!compactProfileQuery.matches) {
          profileCard.classList.remove('is-compact');
        }
        syncMobileProfileCompaction();
      });
      window.addEventListener('resize', syncMobileProfileCompaction);
      syncMobileProfileCompaction();
    }

    /* =========================
       GSAP SCROLL ANIMATIONS FOR PORTFOLIO
    ========================= */
    gsap.registerPlugin(ScrollTrigger);

    // Watch for new .animate elements and animate them
    const animatePortfolioCards = () => {
      const animateElements = document.querySelectorAll('.workspace-body .animate');
      if (!animateElements.length) return;

      // Remove any existing animations
      gsap.killTweensOf(animateElements);

      gsap.from(animateElements, {
        scrollTrigger: {
          trigger: '.workspace-body',
          start: "top center",
          toggleActions: "play none none none"
        },
        opacity: 0,
        y: 30,
        duration: 0.6,
        stagger: {
          amount: 0.2,
          from: "start"
        },
        ease: "power3.out"
      });
    };

    // Use MutationObserver to catch when new elements are added
    const observer = new MutationObserver(() => {
      // Debounce the animation trigger
      clearTimeout(window.animateDebounce);
      window.animateDebounce = setTimeout(() => {
        animatePortfolioCards();
        ScrollTrigger.refresh();
      }, 50);
    });

    observer.observe(stage, {
      childList: true,
      subtree: true
    });

    // Initial animation for first section
    setTimeout(() => {
      animatePortfolioCards();
      ScrollTrigger.refresh();
    }, 300);
  </script>
</body>
</html>
